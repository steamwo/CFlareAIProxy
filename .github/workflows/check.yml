name: Check CFlareAPI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check configuration
        run: node scripts/check-config.mjs
      - name: Check web assets
        run: node scripts/check-web.mjs
      - name: Typecheck worker and web
        run: pnpm run typecheck
      - name: Run tests
        run: pnpm run test
      - name: Build production web bundle
        run: pnpm run build:web
      - name: Wrangler dry run
        run: pnpm run config:check
