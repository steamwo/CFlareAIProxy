name: Check CFlareAIProxy

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-brand-rename:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/rename-cflareapi-brand'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - name: Apply exact legacy brand replacements
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import json

          old = ("CFlare" + "API").encode()
          new = b"CFlareAIProxy"
          report = json.loads(Path(".rename-report.json").read_text(encoding="utf-8"))
          skip = {
              ".github/workflows/check.yml",
              ".github/workflows/rename-cflareapi-brand.yml",
          }
          changed = []
          for name in report["content_matches"]:
              if name in skip:
                  continue
              path = Path(name)
              data = path.read_bytes()
              updated = data.replace(old, new)
              if updated != data:
                  path.write_bytes(updated)
                  changed.append(name)
          print(f"Updated {len(changed)} project files")
          for name in changed:
              print(f"  {name}")
          PY

          git show origin/main:.github/workflows/check.yml > .github/workflows/check.yml
          python <<'PY'
          from pathlib import Path
          path = Path(".github/workflows/check.yml")
          path.write_bytes(path.read_bytes().replace(("CFlare" + "API").encode(), b"CFlareAIProxy"))
          PY

          rm -f .github/workflows/rename-cflareapi-brand.yml .rename-report.json

          python <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          old_text = "CFlare" + "API"
          old = old_text.encode()
          result = subprocess.run(
              ["git", "ls-files", "-z"], stdout=subprocess.PIPE, check=True
          )
          paths = [Path(value.decode()) for value in result.stdout.split(b"\0") if value]
          failures = []
          for path in paths:
              if old_text in str(path):
                  failures.append(f"path: {path}")
              if not path.is_file():
                  continue
              data = path.read_bytes()
              if b"\0" not in data and old in data:
                  failures.append(f"content: {path}")
          if failures:
              print("Legacy brand references remain:", file=sys.stderr)
              print("\n".join(failures), file=sys.stderr)
              raise SystemExit(1)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rename CFlareAPI to CFlareAIProxy"
          git push origin HEAD:${GITHUB_HEAD_REF}

  check:
    needs: apply-brand-rename
    if: always() && (needs.apply-brand-rename.result == 'success' || needs.apply-brand-rename.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check configuration
        id: config
        continue-on-error: true
        run: node scripts/check-config.mjs
      - name: Check web assets
        id: web
        continue-on-error: true
        run: node scripts/check-web.mjs
      - name: Typecheck worker and web
        id: types
        continue-on-error: true
        run: pnpm run typecheck
      - name: Run tests
        id: tests
        continue-on-error: true
        run: pnpm exec vitest run --reporter=json --outputFile=vitest-results.json
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: vitest-results.json
          if-no-files-found: ignore
      - name: Build production web bundle
        id: build
        continue-on-error: true
        run: pnpm run build:web
      - name: Wrangler dry run
        id: wrangler
        continue-on-error: true
        run: pnpm run config:check
      - name: Enforce validation results
        if: always()
        run: |
          if [ "${{ steps.config.outcome }}" != "success" ] \
            || [ "${{ steps.web.outcome }}" != "success" ] \
            || [ "${{ steps.types.outcome }}" != "success" ] \
            || [ "${{ steps.tests.outcome }}" != "success" ] \
            || [ "${{ steps.build.outcome }}" != "success" ] \
            || [ "${{ steps.wrangler.outcome }}" != "success" ]; then
            exit 1
          fi
