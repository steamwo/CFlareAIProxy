name: Check CFlareAIProxy

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check configuration
        id: config
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/check-config.mjs 2>&1 | tee config-check.log
      - name: Check web assets
        id: web
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/check-web.mjs 2>&1 | tee web-check.log
      - name: Typecheck worker and web
        id: types
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm run typecheck 2>&1 | tee typecheck.log
      - name: Run tests
        id: tests
        continue-on-error: true
        run: pnpm exec vitest run --reporter=json --outputFile=vitest-results.json
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: vitest-results.json
          if-no-files-found: ignore
      - name: Build production web bundle
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm run build:web 2>&1 | tee build-web.log
      - name: Wrangler dry run
        id: wrangler
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm run config:check 2>&1 | tee wrangler.log
      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: |
            config-check.log
            web-check.log
            typecheck.log
            build-web.log
            wrangler.log
          if-no-files-found: ignore
      - name: Enforce validation results
        if: always()
        run: |
          if [ "${{ steps.config.outcome }}" != "success" ] \
            || [ "${{ steps.web.outcome }}" != "success" ] \
            || [ "${{ steps.types.outcome }}" != "success" ] \
            || [ "${{ steps.tests.outcome }}" != "success" ] \
            || [ "${{ steps.build.outcome }}" != "success" ] \
            || [ "${{ steps.wrangler.outcome }}" != "success" ]; then
            exit 1
          fi
