name: Finalize locally tested OpenCode fix

on:
  push:
    branches: [agent/fix-opencode-failover]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-opencode-failover
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Apply locally validated patch
        run: |
          base64 -d .tmp-final/final.patch.gz.b64 | gzip -d > /tmp/final.patch
          patch -p1 < /tmp/final.patch
          git fetch origin dev
          git checkout origin/dev -- .github/workflows/check.yml src/proxy.ts
          rm -rf .tmp-final .github/workflows/finalize-local-fix.yml
      - name: Validate generated workspace
        run: |
          pnpm install --frozen-lockfile
          pnpm run check
          pnpm run build:web
          pnpm run config:check
      - name: Commit final fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix OpenCode mirror failover in Worker runtime"
          git push origin HEAD:agent/fix-opencode-failover
