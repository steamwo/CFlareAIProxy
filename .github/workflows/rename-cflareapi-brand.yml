name: Rename legacy project brand

on:
  push:
    branches:
      - agent/rename-cflareapi-brand

permissions:
  contents: write

jobs:
  rename:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Replace exact legacy brand references
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import subprocess

          old = b"CFlareAPI"
          new = b"CFlareAIProxy"
          workflow = Path(".github/workflows/rename-cflareapi-brand.yml")

          result = subprocess.run(
              ["git", "grep", "-Il", "-z", old.decode()],
              stdout=subprocess.PIPE,
              check=False,
          )
          paths = [Path(value.decode()) for value in result.stdout.split(b"\0") if value]
          changed = []
          for path in paths:
              if path == workflow:
                  continue
              data = path.read_bytes()
              updated = data.replace(old, new)
              if updated != data:
                  path.write_bytes(updated)
                  changed.append(str(path))

          print(f"Updated {len(changed)} files")
          for path in changed:
              print(f"  {path}")
          PY

          rm .github/workflows/rename-cflareapi-brand.yml

          if git grep -n -- 'CFlareAPI'; then
            echo "Legacy brand references remain" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rename CFlareAPI to CFlareAIProxy"
          git push origin HEAD:${GITHUB_REF_NAME}
